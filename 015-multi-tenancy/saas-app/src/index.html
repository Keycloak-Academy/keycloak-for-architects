<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 480px; margin: 100px auto; padding: 0 20px; }
    .card { background: white; border-radius: 8px; padding: 40px 32px; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; }
    h1 { font-size: 1.6rem; margin-bottom: 8px; }
    p { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .tenant { display: inline-block; font-size: 0.95rem; font-weight: 600; color: #1a73e8; background: #e8f0fe; padding: 4px 16px; border-radius: 20px; margin-bottom: 24px; }
    button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #1558b0; }
    button.secondary { background: #f1f3f4; color: #555; }
    button.secondary:hover { background: #e2e5e9; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.jsx"></script>
</body>
</html>
