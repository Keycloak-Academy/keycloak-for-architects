<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Savings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 640px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    h2 { font-size: 1.1rem; margin-bottom: 12px; color: #555; }
    button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #1558b0; }
    button.secondary { background: #f1f3f4; color: #333; }
    button.secondary:hover { background: #e2e5e9; }
    .badge { display: inline-block; background: #e8f0fe; color: #1a73e8; border-radius: 4px; padding: 2px 8px; font-size: 0.8rem; margin-right: 4px; }
    .error { color: #c62828; background: #ffebee; padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; }
    .scope-tag { display: inline-block; background: #e6f4ea; color: #1e7e34; border: 1px solid #a8d5b5; border-radius: 4px; padding: 2px 8px; font-size: 0.8rem; margin-right: 4px; font-family: monospace; }
    .balance-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    .balance-row:last-child { border-bottom: none; }
    .balance-amount { font-weight: 600; color: #1e7e34; }
    .notice { background: #fffde7; border: 1px solid #ffe082; border-radius: 6px; padding: 14px; font-size: 0.9rem; color: #555; }
    .notice p { margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.jsx"></script>
</body>
</html>
